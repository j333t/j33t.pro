html{scrollbar-width:thin;scrollbar-color:rgba(120,120,110,0.25) transparent;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(120,120,110,0.25);border-radius:1px;}
::-webkit-scrollbar-thumb:hover{background:rgba(120,120,110,0.45);}
html,body{background:#F7F4F3;}
html:has(#outer[data-dark="1"]),body:has(#outer[data-dark="1"]){background:#0e0e0c;}
::selection{background:var(--green);color:#fff;}

/* custom cursor */
#cur{display:none;}
@media(pointer:fine){
  body:not(.has-selection) *{cursor:none!important;}
  #cur{
    display:block;position:fixed;top:0;left:0;width:14px;height:14px;
    pointer-events:none;z-index:9999;transform:translate(-50%,-50%);
    opacity:0;transition:opacity 0.15s;
  }
  #cur svg{display:block;width:14px;height:14px;overflow:visible;transition:transform 0.08s ease;}
  .has-selection #cur{opacity:0!important;}
}

/* scroll progress */
#prog{position:fixed;top:0;left:0;height:1px;width:100%;background:var(--green);transform-origin:left;transform:scaleX(0);z-index:1000;transition:transform 0.05s linear;}

#outer{
  --bg:#F7F4F3;--text:#000100;--text-muted:#4a4a48;--text-hint:#999993;
  --border:rgba(0,1,0,0.1);--border-med:rgba(0,1,0,0.2);--surface:#edeae8;
  background:var(--bg);color:var(--text);min-height:100vh;width:100%;
  transition:background 0.3s,color 0.3s;
}
#outer[data-dark="1"]{
  --bg:#0e0e0c;--text:#F0EDE8;--text-muted:#a8a49e;--text-hint:#5a5a55;
  --border:rgba(240,237,232,0.1);--border-med:rgba(240,237,232,0.2);--surface:#1a1a16;
}

.site{font-family:'Instrument Sans',sans-serif;font-size:18px;max-width:680px;margin:0 auto;padding:0 1.5rem 4rem;padding-top:12rem;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.5rem 0;background:transparent;transition:padding 0.3s var(--ease),background 0.3s,border-color 0.3s;border-bottom:0.5px solid transparent;}
nav.scrolled{padding:0.9rem 0;background:color-mix(in srgb,var(--bg) 88%,transparent);border-bottom-color:var(--border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.nav-inner{max-width:680px;margin:0 auto;padding:0 1.5rem;display:flex;justify-content:space-between;align-items:center;}
.nav-logo{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;letter-spacing:-0.02em;color:var(--text);}
.nav-cursor{color:var(--green);animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.nav-aka{font-size:11px;color:var(--text-hint);letter-spacing:0.02em;margin-top:2px;}
.nav-right{display:flex;align-items:center;gap:1.25rem;}
.theme-btn{background:none;border:0.5px solid var(--border-med);border-radius:4px;width:26px;height:26px;cursor:pointer;font-size:14px;color:var(--text-hint);display:flex;align-items:center;justify-content:center;transition:border-color 0.2s,color 0.2s;}
.theme-btn:hover{color:var(--text-muted);}
.nav-cta a{font-size:14px;color:var(--text-muted);text-decoration:none;border-bottom:0.5px solid var(--border-med);padding-bottom:1px;transition:color 0.2s;}
.nav-cta a:hover{color:var(--text);}

/* REVEAL */
.reveal{opacity:0;transform:translateY(20px);transition:opacity 0.65s var(--ease),transform 0.65s var(--ease);}
.reveal.visible{opacity:1;transform:translateY(0);}

/* HERO */
.hero{margin-bottom:8rem;}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;color:var(--text-hint);text-transform:uppercase;margin-bottom:1.5rem;height:16px;position:relative;}
.eyebrow-text{position:absolute;transition:opacity 0.5s ease,transform 0.5s ease;white-space:nowrap;}
.eyebrow-text.hidden{opacity:0;transform:translateY(-4px);pointer-events:none;}
.eyebrow-text.visible{opacity:1;transform:translateY(0);}
.hero-headline{font-family:'DM Serif Display',serif;font-size:clamp(32px,5vw,44px);line-height:1.15;font-weight:400;margin-bottom:2.25rem;max-width:540px;color:var(--text);}
.hero-headline em{font-style:italic;color:var(--text-muted);}
.hero-sub{font-size:18px;color:var(--text-muted);line-height:1.7;max-width:460px;}

.divider{height:0.5px;background:var(--border);margin:3.5rem 0;}

/* SECTION LABEL */
.section-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.14em;color:var(--text-hint);text-transform:uppercase;margin-bottom:2.25rem;display:flex;align-items:center;gap:0.75rem;}
.section-link{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-hint);text-decoration:none;letter-spacing:0.06em;margin-left:auto;transition:color 0.2s;}
.section-link:hover{color:var(--text-muted);}

/* LIVE DOT + always-visible label */

.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red-live);animation:livepulse 1.8s ease-in-out infinite;display:inline-block;flex-shrink:0;position:relative;top:0;}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:0.25}}
.live-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.06em;color:var(--text-hint);text-transform:none;opacity:0.7;}

/* PROJECTS */
.projects{margin-bottom:5rem;}
.project-item{border-top:0.5px solid var(--border);cursor:pointer;}
.project-item:hover .project-what{color:var(--text);}
.project-item:hover .project-why{color:var(--text-muted);}
.project-item:hover .project-date{color:var(--text-muted);}
.project-header{padding:1rem 0;display:grid;grid-template-columns:1fr auto;gap:0.35rem 2rem;align-items:start;}
.project-what{font-size:18px;font-weight:500;color:var(--text);grid-column:1;transition:color 0.18s;}
.project-why{font-size:14px;color:var(--text-muted);line-height:1.5;grid-column:1;transition:color 0.18s;}
.project-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-hint);grid-column:2;grid-row:1;white-space:nowrap;transition:color 0.18s;}
.project-toggle{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);float:right;opacity:0;transition:opacity 0.2s;user-select:none;margin-left:8px;}
.project-item:hover .project-toggle,.project-item.open .project-toggle{opacity:1;}
.project-expand{max-height:0;overflow:hidden;transition:max-height 0.35s ease;}
.project-item.open .project-expand{max-height:160px;}
.project-detail-grid{padding:0 0 1rem;display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.project-detail-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-hint);margin-bottom:4px;}
.project-detail-val{font-size:11px;color:var(--text-muted);line-height:1.5;}
.project-separator{padding:0.67rem 0;border-top:0.5px solid var(--border);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-hint);opacity:0.6;}
.craftycrow-note{padding:1rem 0;border-top:0.5px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;color:var(--text-hint);letter-spacing:0.04em;}
.craftycrow-note a{color:var(--green);text-decoration:none;opacity:0.85;transition:opacity 0.2s;}
.craftycrow-note a:hover{opacity:1;}

.publications{margin-bottom:5rem;}
.pub-item{padding:1rem 0;border-top:0.5px solid var(--border);display:grid;grid-template-columns:auto 1fr auto;grid-template-rows:auto auto;gap:0.3rem 1rem;text-decoration:none;transition:color 0.18s;align-items:start;}
.pub-item:hover .pub-title{color:var(--text);}

.pub-desc{font-size:14px;color:var(--text-hint);line-height:1.5;grid-column:2;grid-row:2;transition:color 0.18s;}

.pub-loading{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-hint);padding:1rem 0;border-top:0.5px solid var(--border);}

.editorial-cta a::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:0.5px;background:currentColor;transform:scaleX(0.4);transform-origin:left;transition:transform 0.25s ease;opacity:0.5;}
.editorial-cta a:hover{color:var(--text);}
.editorial-cta a:hover::after{transform:scaleX(1);opacity:1;}

.footer-fire{display:flex;justify-content:center;}

@keyframes ignite{0%{opacity:0;transform:translateY(4px);}100%{opacity:0.4;transform:translateY(0);}}
.fire{font-family:'Noto Emoji',sans-serif;font-size:1em;cursor:default;opacity:0;transform:translateY(4px);display:block;text-align:center;padding:1.5rem 0;transition:opacity 3.75s ease-in-out;}

.fire.blazing{opacity:0.4;transform:translateY(0);}
.fire.blazing:hover{opacity:0.65;transition:opacity 3.75s ease-in-out;}

@media(max-width:480px){

    <div class="editorial-heading">There's a different kind of work I do.</div>
    <div class="editorial-body">
      <p>Not for a company. For you — if you're already good at what you do, and you sense there's something you're missing.</p>
      <p>It's not coaching — coaches let you find your own answers. It's not consulting — consultants diagnose systems, not people. It's not training — trainers transfer knowledge.</p>
      <p>It's closer to what a great editor does for a writer. You can't see what's missing because you're too close to your own work.</p>
      <p>Sometimes one small thing unlocks it all.</p>
      <p>Tell me what you're building, or what's breaking in your business — or where you think you're leaving something on the table.</p>

    <div class="editorial-cta">
      <a href="https://cal.com/j33tx" target="_blank" rel="noopener">Let's talk »</a>
    </div>
  </section>

  <footer class="footer reveal">
    <div class="footer-top">
      <div class="footer-left"><span>j33t.pro</span></div>
      <div class="footer-links">
        <a href="https://craftycrow.co" target="_blank">craftycrow.co ↗</a>
        <a href="mailto:connect@j33t.pro" class="footer-contact">email</a>
        <a href="https://wa.me/919920221230" target="_blank" class="footer-contact">whatsapp</a>
      </div>
    </div>
    <div class="footer-fire">
      <span class="fire" id="fire">🔥</span>
    </div>
  </footer>

</div>
</div>

<script>
const SHEET_URL  = 'https://docs.google.com/spreadsheets/d/1G3cyBvVw1xCE2gX0_FXary_iYuMxMsK_V2u-4w6jTFY/gviz/tq?tqx=out:csv';
const BUTTONDOWN = 'j33t';
const YT_CHANNEL = 'UCQRmxBu9Cji-T4ZI9C70wiw';

const cur = document.getElementById('cur');
if (cur && window.matchMedia('(pointer:fine)').matches) {
  let mx = window.innerWidth/2, my = window.innerHeight/2;
  let cx = mx, cy = my;
  let visible = false;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    if (!visible) { cur.style.opacity = '1'; visible = true; }
  });
  document.addEventListener('mouseleave', () => { cur.style.opacity = '0'; visible = false; });
  document.addEventListener('mouseenter', () => { if (visible) cur.style.opacity = '1'; });
  const curSvg = cur.querySelector('svg');
  document.addEventListener('mousedown', () => {
    if(curSvg) { curSvg.style.transition = 'transform 0.08s ease'; curSvg.style.transform = 'rotate(45deg)'; }
  });
  document.addEventListener('mouseup', () => {
    if(curSvg) { curSvg.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1)'; curSvg.style.transform = 'rotate(0deg)'; }
  });
  document.addEventListener('mouseover', e => {
    if (e.target.closest('a, button')) curSvg.style.transform = 'scale(1.5)';
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('a, button')) curSvg.style.transform = 'scale(1)';
  });
  if (/Edg\//.test(navigator.userAgent)) {
    document.addEventListener('selectionchange', () => {
      const sel = document.getSelection();
      document.body.classList.toggle('has-selection', !!(sel && sel.toString().length > 0));
    });
  }
  (function tick() {
    cx += (mx - cx) * 0.45;
    cy += (my - cy) * 0.45;
    cur.style.left = cx + 'px';
    cur.style.top  = cy + 'px';
    requestAnimationFrame(tick);
  })();
}

const prog = document.getElementById('prog');
window.addEventListener('scroll', () => {
  const h = document.documentElement.scrollHeight - window.innerHeight;
  if (h > 0) prog.style.transform = `scaleX(${Math.min(window.scrollY / h, 1)})`;
}, { passive: true });

const navEl = document.getElementById('nav');
window.addEventListener('scroll', () => {
  navEl.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

const outer = document.getElementById('outer');
document.getElementById('themeBtn').onclick = () => {
  const dark = outer.getAttribute('data-dark') === '1';
  outer.setAttribute('data-dark', dark ? '0' : '1');
  localStorage.setItem('j33t-dark', dark ? '0' : '1');
};
if (localStorage.getItem('j33t-dark') === '1') outer.setAttribute('data-dark','1');

const ey1 = document.getElementById('ey1'), ey2 = document.getElementById('ey2');
let tog = false;
setInterval(() => {
  tog = !tog;
  ey1.className = 'eyebrow-text ' + (tog ? 'hidden' : 'visible');
  ey2.className = 'eyebrow-text ' + (tog ? 'visible' : 'hidden');
}, 3200);

const revealObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }
  });
}, { threshold: 0.08 });
document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

function toggleProject(el) {
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.project-item.open').forEach(i => i.classList.remove('open'));
  document.querySelectorAll('.project-toggle').forEach(t => t.textContent = '+ more');
  if (!wasOpen) {
    el.classList.add('open');
    el.querySelector('.project-toggle').textContent = '− less';
  }
}

const fire = document.getElementById('fire');
fire.addEventListener('animationend', e => {
  if (e.animationName === 'ignite') fire.classList.add('blazing');
});
new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      fire.classList.add('lit');
    } else {
      fire.classList.remove('lit','blazing');
      fire.style.cssText = 'opacity:0;transform:translateY(4px);';
      setTimeout(() => fire.style.cssText = '', 50);
    }
  });
}, { threshold: 0.5 }).observe(fire);

const dotsEl = document.getElementById('dots');
let d = 0;
const dotAnim = setInterval(() => { d = (d+1)%4; dotsEl.textContent = '.'.repeat(d||1); }, 400);

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  return (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();
}
function truncate(str, n) {
  if (!str || str.length <= n) return str;
  return str.slice(0, n).replace(/\s\S*$/, '') + '…';
}
function fmtDate(str) {
  return new Date(str).toLocaleDateString('en-IN', { month: 'short', year: 'numeric' });
}

function renderPubs(items) {
  clearInterval(dotAnim);
  const list = document.getElementById('pub-list');
  if (!items.length) { list.innerHTML = '<div class="pub-loading">nothing yet</div>'; return; }
  list.innerHTML = items.slice(0, 8).map(p => `
    <a class="pub-item" href="${p.url}" target="_blank" rel="noopener">
      <span class="pub-type">${p.type}</span>
      <span class="pub-title">${p.title}</span>
      ${p.desc ? `<span class="pub-desc">${p.desc}</span>` : ''}
      <span class="pub-date">${p.date}</span>
    </a>`).join('');
}

function linkify(text) {
  if (!text) return '';
  return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--green);text-decoration:none;border-bottom:0.5px solid var(--green);">$1</a>');
}

function renderProjects(rows) {
  if (!rows || !rows.length) return;
  let html = '';
  let lastType = null;
  rows.forEach(r => {
    const type = (r.type || '').trim().toLowerCase();
    if (type && type !== lastType) {
      html += `<div class="project-separator">${r.type}</div>`;
      lastType = type;
    }
    html += `
    <div class="project-item" ${(r.outcome || r.val2 || r.image) ? 'onclick="toggleProject(this)"' : 'style="pointer-events:none;cursor:default"'}>
      <div class="project-header">
        <div class="project-what">${r.what || ''}${(r.outcome || r.val2 || r.image) ? ' <span class="project-toggle">+ more</span>' : ''}</div>
        <div class="project-date">${r.date || ''}</div>
        <div class="project-why">${r.why || ''}</div>
      </div>
      <div class="project-expand"><div class="project-detail-grid">
        ${r.outcome ? `<div><div class="project-detail-label">Outcome</div><div class="project-detail-val">${linkify(r.outcome)}</div></div>` : ''}
        ${r.val2 ? `<div><div class="project-detail-label">${r.label2 || 'Notes'}</div><div class="project-detail-val">${linkify(r.val2)}</div></div>` : ''}
      </div>${r.image ? `<img src="${r.image}" loading="lazy" style="margin-top:0.75rem;width:100%;border-radius:4px;display:block;" />` : ''}</div>
    </div>`;
  });
  document.getElementById('project-list').innerHTML = html;
}

async function fetchFeeds() {
  const proxy = 'https://api.rss2json.com/v1/api.json?rss_url=';
  const results = [];

  if (SHEET_URL) {
    try {
      const r = await fetch(SHEET_URL);
      const text = await r.text();
      const parseCSV = raw => {
      const rows = []; let cur = [], field = '', inQ = false;
      for (let i = 0; i <= raw.length; i++) {
        const ch = raw[i];
        if (inQ) {
          if (ch === '"' && raw[i+1] === '"') { field += '"'; i++; }
          else if (ch === '"') inQ = false;
          else field += ch;
        } else if (ch === '"') { inQ = true; }
        else if (ch === ',') { cur.push(field.trim()); field = ''; }
        else if (ch === '\n' || ch === undefined) {
          cur.push(field.trim()); rows.push(cur); cur = []; field = '';
        } else if (ch !== '\r') { field += ch; }
      }
      return rows;
    };
    const rows = parseCSV(text.trim());
    const headers = rows[0].map(h => h.replace(/^"|"$/g,'').toLowerCase());
    const objs = rows.slice(1).filter(r => r.some(v => v)).map(vals => {
      const obj = {};
      headers.forEach((h,i) => obj[h] = (vals[i] || '').replace(/^"|"$/g,''));
      return obj;
    });
    renderProjects(objs);
    } catch(e) { console.warn('Sheet fetch failed', e); }
  }

  try {
    const r = await fetch(`https://buttondown.com/${BUTTONDOWN}/rss`);
    const xml = await r.text();
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    Array.from(doc.querySelectorAll('item')).slice(0, 6).forEach(item => {
      const get = tag => item.querySelector(tag)?.textContent?.trim() || '';
      const itemXml = item.outerHTML || new XMLSerializer().serializeToString(item);
      const contentMatch = itemXml.match(/<content:encoded[^>]*>([\s\S]*?)<\/content:encoded>/i);
      const fullBody = contentMatch ? stripHtml(contentMatch[1].replace(/<!?\[CDATA\[|\]\]>/g,'')) : '';
      const preview = stripHtml(get('description'));
      const desc = (preview && fullBody && preview.length < fullBody.length * 0.7)
        ? preview
        : truncate(fullBody || preview, 160);
      results.push({ type: 'article', title: get('title'), desc, date: fmtDate(get('pubDate')), url: get('link') });
    });
  } catch(e) { console.warn('Buttondown fetch failed', e); }

  if (YT_CHANNEL) {
    try {
      const r = await fetch(proxy + encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${YT_CHANNEL}`));
      const data = await r.json();
      if (data.items) data.items.slice(0, 4).forEach(i => results.push({
        type: 'video', title: i.title,
        desc: truncate(stripHtml(i.description || ''), 120),
        date: fmtDate(i.pubDate), url: i.link
      }));
    } catch(e) { console.warn('YT fetch failed', e); }
  }

  renderPubs(results);
}

fetchFeeds();
</script>
</body>
</html>
